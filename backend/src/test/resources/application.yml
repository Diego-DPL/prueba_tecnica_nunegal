server:
  port: 5000

spring:
  application:
    name: similar-products-api-test

external-api:
  base-url: http://localhost:3001
  timeout: 3000
  max-retries: 2

phone-shop-api:
  base-url: http://localhost:3002
  timeout: 5000

resilience4j:
  circuitbreaker:
    instances:
      productService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      phoneShopService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      productService:
        timeout-duration: 3s
      phoneShopService:
        timeout-duration: 10s
