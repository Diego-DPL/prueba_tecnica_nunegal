server:
  port: 8080

spring:
  application:
    name: similar-products-api

# External API configuration (Similar Products mock)
external-api:
  base-url: http://localhost:3001
  timeout: 3000
  max-retries: 2

# Phone Shop API configuration
phone-shop-api:
  base-url: https://itx-frontend-test.onrender.com
  timeout: 10000

# Resilience4j configuration
resilience4j:
  circuitbreaker:
    instances:
      productService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      phoneShopService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      productService:
        timeout-duration: 3s
      phoneShopService:
        timeout-duration: 10s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.itx.similarproducts: DEBUG
